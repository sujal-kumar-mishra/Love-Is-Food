<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Kitchen Assistant AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --copper-orange: #ED8936;
            --sage-green: #68D391;
            --forest-green: #22543D;
            --charcoal: #2D3748;
            --cream: #F7FAFC;
            --soft-gray: #E2E8F0;
            --warm-white: #FEFEFE;
            --error-color: #ef4444;
            --text-primary: var(--charcoal);
            --text-secondary: #718096;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, rgba(237, 137, 54, 0.95) 0%, rgba(104, 211, 145, 0.85) 100%),
                        url('/static/images/chef-preparation.jpg') center/cover fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(45, 53, 72, 0.2);
            max-width: 480px;
            width: 100%;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            background: linear-gradient(135deg, var(--copper-orange) 0%, rgba(237, 137, 54, 0.9) 100%);
            padding: 48px 40px;
            text-align: center;
            color: white;
        }

        .auth-icon {
            font-size: 56px;
            margin-bottom: 20px;
            animation: iconBounce 2s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .auth-header p {
            font-size: 15px;
            opacity: 0.95;
        }

        .auth-body {
            padding: 48px 40px;
            background: var(--warm-white);
        }

        .info-text {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--cream);
            border: 2px solid var(--soft-gray);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--copper-orange);
            background: var(--warm-white);
            box-shadow: 0 0 0 4px rgba(237, 137, 54, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--copper-orange) 0%, #f6ad55 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(237, 137, 54, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(237, 137, 54, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--copper-orange);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #f6ad55;
        }

        .alert {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        .alert-success {
            background: rgba(104, 211, 145, 0.15);
            border: 2px solid var(--sage-green);
            color: var(--forest-green);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid var(--error-color);
            color: #991b1b;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .loading-spinner.show {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-strength {
            margin-top: 8px;
            font-size: 13px;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .strength-bar {
            height: 4px;
            background: var(--soft-gray);
            border-radius: 2px;
            margin-bottom: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-weak { width: 33%; background: var(--error-color); }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: var(--sage-green); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-icon">🔑</div>
            <h1>Forgot Password?</h1>
            <p>We'll send you reset instructions</p>
        </div>

        <div class="auth-body">
            <div id="alert" class="alert"></div>

            <!-- Step 1: Email Verification -->
            <div id="emailStep">
                <p class="info-text">
                    Enter your email address to reset your password.
                </p>

                <form id="emailForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="your.email@example.com" 
                            required
                            autocomplete="email"
                        >
                    </div>

                    <button type="submit" class="btn" id="emailBtn">
                        <span id="emailBtnText">Continue</span>
                        <div class="loading-spinner" id="emailSpinner"></div>
                    </button>
                </form>
            </div>

            <!-- Step 2: Password Reset (Hidden Initially) -->
            <div id="passwordStep" style="display: none;">
                <p class="info-text">
                    Enter your new password for <strong id="userEmail"></strong>
                </p>

                <form id="passwordForm">
                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <input 
                            type="password" 
                            id="new_password" 
                            name="new_password" 
                            placeholder="Enter new password" 
                            required
                            autocomplete="new-password"
                        >
                        <div class="password-strength" id="strengthIndicator">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span id="strengthText"></span>
                        </div>
                        <small style="color: var(--text-secondary); font-size: 12px; display: block; margin-top: 6px;">
                            Must contain: 8+ characters, uppercase, lowercase, number, special character (!@#$% etc.)
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirm_password" 
                            name="confirm_password" 
                            placeholder="Confirm new password" 
                            required
                            autocomplete="new-password"
                        >
                    </div>

                    <button type="submit" class="btn" id="resetBtn">
                        <span id="btnText">Reset Password</span>
                        <div class="loading-spinner" id="spinner"></div>
                    </button>

                    <button type="button" class="btn" id="backBtn" style="background: var(--soft-gray); color: var(--text-primary); margin-top: 12px;">
                        ← Back to Email
                    </button>
                </form>
            </div>

            <a href="/login" class="back-link">← Back to Login</a>
        </div>
    </div>

    <script>
        const emailStep = document.getElementById('emailStep');
        const passwordStep = document.getElementById('passwordStep');
        const emailForm = document.getElementById('emailForm');
        const passwordForm = document.getElementById('passwordForm');
        const emailBtn = document.getElementById('emailBtn');
        const emailBtnText = document.getElementById('emailBtnText');
        const emailSpinner = document.getElementById('emailSpinner');
        const resetBtn = document.getElementById('resetBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const backBtn = document.getElementById('backBtn');
        const alert = document.getElementById('alert');
        const userEmail = document.getElementById('userEmail');
        const newPasswordInput = document.getElementById('new_password');
        const confirmPasswordInput = document.getElementById('confirm_password');
        const strengthIndicator = document.getElementById('strengthIndicator');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        let verifiedEmail = '';

        function showAlert(message, type = 'error') {
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            setTimeout(() => alert.classList.remove('show'), 6000);
        }

        function setEmailLoading(loading) {
            emailBtn.disabled = loading;
            emailBtnText.style.display = loading ? 'none' : 'inline';
            emailSpinner.classList.toggle('show', loading);
        }

        function setResetLoading(loading) {
            resetBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            spinner.classList.toggle('show', loading);
        }

        function validatePassword(password) {
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
            };

            const allMet = Object.values(requirements).every(req => req);
            return { requirements, allMet };
        }

        function checkPasswordStrength(password) {
            const validation = validatePassword(password);
            const requirements = validation.requirements;
            
            let strength = 0;
            if (requirements.length) strength++;
            if (requirements.uppercase && requirements.lowercase) strength++;
            if (requirements.number) strength++;
            if (requirements.special) strength++;

            strengthIndicator.classList.add('show');

            if (!validation.allMet) {
                const missing = [];
                if (!requirements.length) missing.push('8 characters');
                if (!requirements.uppercase) missing.push('uppercase letter');
                if (!requirements.lowercase) missing.push('lowercase letter');
                if (!requirements.number) missing.push('number');
                if (!requirements.special) missing.push('special character');

                if (strength < 2) {
                    strengthFill.className = 'strength-fill strength-weak';
                    strengthText.innerHTML = `Weak - Missing: ${missing.join(', ')}`;
                    strengthText.style.color = 'var(--error-color)';
                } else if (strength < 4) {
                    strengthFill.className = 'strength-fill strength-medium';
                    strengthText.innerHTML = `Medium - Missing: ${missing.join(', ')}`;
                    strengthText.style.color = '#f59e0b';
                } else {
                    strengthFill.className = 'strength-fill strength-medium';
                    strengthText.innerHTML = `Almost - Missing: ${missing.join(', ')}`;
                    strengthText.style.color = '#f59e0b';
                }
            } else {
                strengthFill.className = 'strength-fill strength-strong';
                strengthText.textContent = '✓ Strong password - All requirements met';
                strengthText.style.color = 'var(--sage-green)';
            }
        }

        // Step 1: Verify email
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();

            if (!email) {
                showAlert('Please enter your email address', 'error');
                return;
            }

            setEmailLoading(true);

            try {
                const response = await fetch('/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    verifiedEmail = email;
                    userEmail.textContent = email;
                    emailStep.style.display = 'none';
                    passwordStep.style.display = 'block';
                    newPasswordInput.focus();
                } else {
                    showAlert(data.message || 'Email not found in our system', 'error');
                }
            } catch (error) {
                console.error('Email verification error:', error);
                showAlert('An error occurred. Please try again.', 'error');
            } finally {
                setEmailLoading(false);
            }
        });

        // Step 2: Reset password
        passwordForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validate password requirements
            const validation = validatePassword(newPassword);
            
            if (!validation.allMet) {
                const missing = [];
                if (!validation.requirements.length) missing.push('at least 8 characters');
                if (!validation.requirements.uppercase) missing.push('one uppercase letter');
                if (!validation.requirements.lowercase) missing.push('one lowercase letter');
                if (!validation.requirements.number) missing.push('one number');
                if (!validation.requirements.special) missing.push('one special character');
                
                showAlert(`Password must contain: ${missing.join(', ')}`, 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            setResetLoading(true);

            try {
                const response = await fetch('/reset-password-direct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: verifiedEmail,
                        password: newPassword 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Failed to reset password', 'error');
                    setResetLoading(false);
                }
            } catch (error) {
                console.error('Reset error:', error);
                showAlert('An error occurred. Please try again.', 'error');
                setResetLoading(false);
            }
        });

        // Back button
        backBtn.addEventListener('click', () => {
            passwordStep.style.display = 'none';
            emailStep.style.display = 'block';
            passwordForm.reset();
            strengthIndicator.classList.remove('show');
            document.getElementById('email').focus();
        });

        // Password strength indicator
        newPasswordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        document.getElementById('email').focus();
    </script>
</body>
</html>
