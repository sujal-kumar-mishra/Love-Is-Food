<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Kitchen Assistant AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --copper-orange: #ED8936;
            --sage-green: #68D391;
            --forest-green: #22543D;
            --charcoal: #2D3748;
            --cream: #F7FAFC;
            --soft-gray: #E2E8F0;
            --warm-white: #FEFEFE;
            --error-color: #ef4444;
            --text-primary: var(--charcoal);
            --text-secondary: #718096;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, rgba(237, 137, 54, 0.95) 0%, rgba(104, 211, 145, 0.85) 100%),
                        url('/static/images/chef-preparation.jpg') center/cover fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(45, 53, 72, 0.2);
            max-width: 480px;
            width: 100%;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            background: linear-gradient(135deg, var(--copper-orange) 0%, rgba(237, 137, 54, 0.9) 100%);
            padding: 48px 40px;
            text-align: center;
            color: white;
        }

        .auth-icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .auth-header p {
            font-size: 15px;
            opacity: 0.95;
        }

        .auth-body {
            padding: 48px 40px;
            background: var(--warm-white);
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--cream);
            border: 2px solid var(--soft-gray);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--copper-orange);
            background: var(--warm-white);
            box-shadow: 0 0 0 4px rgba(237, 137, 54, 0.1);
        }

        .password-strength {
            margin-top: 8px;
            font-size: 13px;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .strength-bar {
            height: 4px;
            background: var(--soft-gray);
            border-radius: 2px;
            margin-bottom: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-weak { width: 33%; background: var(--error-color); }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: var(--sage-green); }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--copper-orange) 0%, #f6ad55 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(237, 137, 54, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(237, 137, 54, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        .alert-success {
            background: rgba(104, 211, 145, 0.15);
            border: 2px solid var(--sage-green);
            color: var(--forest-green);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid var(--error-color);
            color: #991b1b;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .loading-spinner.show {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Enter your new password</p>
        </div>

        <div class="auth-body">
            <div id="alert" class="alert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter new password" 
                        required
                        autocomplete="new-password"
                    >
                    <div class="password-strength" id="strengthIndicator">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span id="strengthText"></span>
                    </div>
                    <small style="color: var(--text-secondary); font-size: 12px; display: block; margin-top: 6px;">
                        Must contain: 8+ characters, uppercase, lowercase, number, special character (!@#$% etc.)
                    </small>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        placeholder="Confirm new password" 
                        required
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn" id="resetBtn">
                    <span id="btnText">Reset Password</span>
                    <div class="loading-spinner" id="spinner"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const alert = document.getElementById('alert');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm_password');
        const strengthIndicator = document.getElementById('strengthIndicator');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showAlert('Invalid or missing reset token', 'error');
            resetBtn.disabled = true;
        }

        function showAlert(message, type = 'error') {
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
        }

        function setLoading(loading) {
            resetBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            spinner.classList.toggle('show', loading);
        }

        function validatePassword(password) {
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
            };

            const allMet = Object.values(requirements).every(req => req);
            return { requirements, allMet };
        }

        function checkPasswordStrength(password) {
            const validation = validatePassword(password);
            const requirements = validation.requirements;
            
            let strength = 0;
            if (requirements.length) strength++;
            if (requirements.uppercase && requirements.lowercase) strength++;
            if (requirements.number) strength++;
            if (requirements.special) strength++;

            strengthIndicator.classList.add('show');

            if (!validation.allMet) {
                const missing = [];
                if (!requirements.length) missing.push('8 characters');
                if (!requirements.uppercase) missing.push('uppercase letter');
                if (!requirements.lowercase) missing.push('lowercase letter');
                if (!requirements.number) missing.push('number');
                if (!requirements.special) missing.push('special character');

                if (strength < 2) {
                    strengthFill.className = 'strength-fill strength-weak';
                    strengthText.innerHTML = `Weak - Missing: ${missing.join(', ')}`;
                    strengthText.style.color = 'var(--error-color)';
                } else if (strength < 4) {
                    strengthFill.className = 'strength-fill strength-medium';
                    strengthText.innerHTML = `Medium - Missing: ${missing.join(', ')}`;
                    strengthText.style.color = '#f59e0b';
                } else {
                    strengthFill.className = 'strength-fill strength-medium';
                    strengthText.innerHTML = `Almost - Missing: ${missing.join(', ')}`;
                    strengthText.style.color = '#f59e0b';
                }
            } else {
                strengthFill.className = 'strength-fill strength-strong';
                strengthText.textContent = '✓ Strong password - All requirements met';
                strengthText.style.color = 'var(--sage-green)';
            }
        }

        passwordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;

            // Validate password requirements
            const validation = validatePassword(password);
            if (!validation.allMet) {
                const missing = [];
                if (!validation.requirements.length) missing.push('at least 8 characters');
                if (!validation.requirements.uppercase) missing.push('one uppercase letter');
                if (!validation.requirements.lowercase) missing.push('one lowercase letter');
                if (!validation.requirements.number) missing.push('one number');
                if (!validation.requirements.special) missing.push('one special character');
                
                showAlert(`Password must contain: ${missing.join(', ')}`, 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Failed to reset password', 'error');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Reset error:', error);
                showAlert('An error occurred. Please try again.', 'error');
                setLoading(false);
            }
        });

        passwordInput.focus();
    </script>
</body>
</html>
