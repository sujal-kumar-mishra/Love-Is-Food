<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="100" cy="100" r="80" fill="url(#blueGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="70" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
  
  <!-- Flame/Streak Icon -->
  <g transform="translate(100, 100)">
    <path d="M0 -25 C-5 -20, -8 -15, -8 -10 C-8 -5, -5 0, 0 0 C0 -5, 2 -8, 5 -10 C5 -5, 3 0, 0 5 C0 10, 5 15, 10 15 C18 15, 22 8, 22 0 C22 -10, 15 -20, 10 -25 C5 -22, 2 -20, 0 -15 Z" 
          fill="url(#blueGradient)" stroke="none"/>
    <path d="M0 0 C2 -2, 5 -5, 5 -8 C5 -12, 2 -15, 0 -18" fill="#FFFFFF" opacity="0.4"/>
  </g>
  
  <!-- Badge Ribbon -->
  <path d="M70 160 L70 190 L100 175 L130 190 L130 160" fill="url(#blueGradient)" opacity="0.8"/>
  
  <!-- Title Text -->
  <text x="100" y="58" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#3B82F6">STREAK</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#3B82F6">KEEPER</text>
</svg>
