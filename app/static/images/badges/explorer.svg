<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="100" cy="100" r="80" fill="url(#purpleGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="70" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#purpleGradient)" stroke-width="3"/>
  
  <!-- Compass/Explorer Icon -->
  <g transform="translate(100, 100)" stroke="url(#purpleGradient)" stroke-width="2.5" fill="none">
    <circle cx="0" cy="0" r="25"/>
    <circle cx="0" cy="0" r="20"/>
    <polygon points="0,-15 -5,0 0,15 5,0" fill="url(#purpleGradient)" stroke="none"/>
    <line x1="0" y1="-28" x2="0" y2="-32" stroke-linecap="round"/>
    <line x1="0" y1="28" x2="0" y2="32" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="-32" y2="0" stroke-linecap="round"/>
    <line x1="28" y1="0" x2="32" y2="0" stroke-linecap="round"/>
  </g>
  
  <!-- Badge Ribbon -->
  <path d="M70 160 L70 190 L100 175 L130 190 L130 160" fill="url(#purpleGradient)" opacity="0.8"/>
  
  <!-- Title Text -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#8B5CF6">EXPLORER</text>
</svg>
