<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDBA74;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="100" cy="100" r="80" fill="url(#orangeGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="70" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#orangeGradient)" stroke-width="3"/>
  
  <!-- Lightning/Quick Icon -->
  <g transform="translate(100, 100)">
    <path d="M5 -30 L-10 5 L5 5 L-5 30 L15 0 L0 0 Z" 
          fill="url(#orangeGradient)" stroke="none"/>
  </g>
  
  <!-- Badge Ribbon -->
  <path d="M70 160 L70 190 L100 175 L130 190 L130 160" fill="url(#orangeGradient)" opacity="0.8"/>
  
  <!-- Title Text -->
  <text x="100" y="58" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#F59E0B">QUICK</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#F59E0B">COOK</text>
</svg>
