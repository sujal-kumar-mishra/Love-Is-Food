<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="copperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB594;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ED8936;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="100" cy="100" r="80" fill="url(#copperGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="70" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#copperGradient)" stroke-width="3"/>
  
  <!-- Chef Hat Icon -->
  <g transform="translate(100, 100)" fill="url(#copperGradient)">
    <path d="M-20 5 Q-20 -10 -15 -20 Q-10 -25 0 -25 Q10 -25 15 -20 Q20 -10 20 5 L20 25 L-20 25 Z" stroke="none"/>
    <rect x="-20" y="15" width="40" height="3" fill="#ED8936"/>
  </g>
  
  <!-- Badge Ribbon -->
  <path d="M70 160 L70 190 L100 175 L130 190 L130 160" fill="url(#copperGradient)" opacity="0.8"/>
  
  <!-- Title Text -->
  <text x="100" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ED8936">FIRST</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ED8936">RECIPE</text>
</svg>
