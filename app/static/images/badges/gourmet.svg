<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="100" cy="100" r="80" fill="url(#silverGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="70" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#silverGradient)" stroke-width="4"/>
  
  <!-- Crown/Gourmet Icon -->
  <g transform="translate(100, 100)" fill="url(#silverGradient)">
    <path d="M-25 5 L-15 -10 L-5 5 L5 -10 L15 5 L25 -10 L25 15 L-25 15 Z" stroke="none"/>
    <circle cx="-15" cy="-10" r="3" fill="#9CA3AF"/>
    <circle cx="5" cy="-10" r="3" fill="#9CA3AF"/>
    <circle cx="25" cy="-10" r="3" fill="#9CA3AF"/>
    <rect x="-22" y="15" width="44" height="5" fill="#9CA3AF"/>
  </g>
  
  <!-- Badge Ribbon -->
  <path d="M70 160 L70 195 L100 177 L130 195 L130 160" fill="url(#silverGradient)" opacity="0.9"/>
  
  <!-- Title Text -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B7280">GOURMET</text>
</svg>
