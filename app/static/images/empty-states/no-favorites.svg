<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Empty Heart -->
  <g transform="translate(200, 130)">
    <path d="M0 20 C0 20, -20 -10, -50 -10 C-75 -10, -90 5, -90 30 C-90 65, -40 95, 0 120 C40 95, 90 65, 90 30 C90 5, 75 -10, 50 -10 C20 -10, 0 20, 0 20 Z" 
          fill="none" stroke="#E2E8F0" stroke-width="8" stroke-dasharray="10,10"/>
  </g>
  
  <!-- Broken Heart Line -->
  <g transform="translate(200, 150)" opacity="0.4">
    <path d="M-15 -20 L-5 10 L5 -10 L15 20" fill="none" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="240" font-family="'Inter', Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#2D3748">
    No Favorites Yet
  </text>
  <text x="200" y="265" font-family="'Inter', Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748B">
    Tap the heart icon on recipes you love
  </text>
</svg>
