<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Error Icon Circle -->
  <circle cx="200" cy="130" r="60" fill="none" stroke="#FEE2E2" stroke-width="8"/>
  <circle cx="200" cy="130" r="50" fill="#FEE2E2" opacity="0.3"/>
  
  <!-- X Mark -->
  <g stroke="#EF4444" stroke-width="6" stroke-linecap="round">
    <line x1="180" y1="110" x2="220" y2="150"/>
    <line x1="220" y1="110" x2="180" y2="150"/>
  </g>
  
  <!-- Alert Triangle -->
  <g transform="translate(200, 70)" opacity="0.5">
    <path d="M0 -15 L-10 5 L10 5 Z" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-2" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="2" r="1" fill="#F59E0B"/>
  </g>
  
  <!-- Broken Connection Lines -->
  <g opacity="0.3">
    <line x1="150" y1="130" x2="130" y2="130" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="5,5"/>
    <line x1="250" y1="130" x2="270" y2="130" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" font-family="'Inter', Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#2D3748">
    Oops! Something went wrong
  </text>
  <text x="200" y="245" font-family="'Inter', Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748B">
    Please try again or contact support if the problem persists
  </text>
</svg>
