<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB594;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ED8936;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Empty Plate -->
  <ellipse cx="200" cy="180" rx="100" ry="15" fill="#E2E8F0" opacity="0.5"/>
  <circle cx="200" cy="170" r="80" fill="none" stroke="#CBD5E1" stroke-width="8"/>
  <circle cx="200" cy="170" r="70" fill="none" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Fork and Knife -->
  <g opacity="0.6">
    <!-- Fork -->
    <rect x="140" y="120" width="3" height="60" fill="#94A3B8" rx="1.5"/>
    <rect x="135" y="120" width="3" height="35" fill="#94A3B8" rx="1.5"/>
    <rect x="145" y="120" width="3" height="35" fill="#94A3B8" rx="1.5"/>
    
    <!-- Knife -->
    <rect x="255" y="120" width="3" height="60" fill="#94A3B8" rx="1.5"/>
    <path d="M255 120 L258 120 L258 110 L255 115 Z" fill="#94A3B8"/>
  </g>
  
  <!-- Sad Face on Plate -->
  <g opacity="0.3">
    <circle cx="185" cy="160" r="3" fill="#64748B"/>
    <circle cx="215" cy="160" r="3" fill="#64748B"/>
    <path d="M185 185 Q200 175 215 185" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="240" font-family="'Inter', Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#2D3748">
    No Recipes Found
  </text>
  <text x="200" y="265" font-family="'Inter', Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748B">
    Start your culinary journey by searching for recipes
  </text>
</svg>
