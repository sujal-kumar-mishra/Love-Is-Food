<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="copperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB594;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ED8936;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86EFAC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#68D391;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Animated Loading Circles -->
  <g>
    <circle cx="100" cy="100" r="50" fill="none" stroke="url(#copperGradient)" stroke-width="4" stroke-dasharray="157 157" stroke-linecap="round" opacity="0.8">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 100 100" to="360 100 100" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="100" cy="100" r="40" fill="none" stroke="url(#sageGradient)" stroke-width="4" stroke-dasharray="125 125" stroke-linecap="round" opacity="0.6">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="360 100 100" to="0 100 100" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="100" cy="100" r="30" fill="none" stroke="url(#copperGradient)" stroke-width="3" stroke-dasharray="94 94" stroke-linecap="round" opacity="0.4">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 100 100" to="360 100 100" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Center Chef Hat Icon -->
  <g transform="translate(100, 100)" fill="url(#copperGradient)" opacity="0.6">
    <path d="M-15 3 Q-15 -8 -11 -15 Q-7 -18 0 -18 Q7 -18 11 -15 Q15 -8 15 3 L15 18 L-15 18 Z" stroke="none"/>
    <rect x="-15" y="11" width="30" height="2" fill="#ED8936"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </g>
</svg>
